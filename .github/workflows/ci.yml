name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  syntax-check:
    name: Lua syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1

      - name: Syntax-check all Lua / shell scripts
        run: |
          set -e
          FAILED=0
          # ReMinux scripts use .lua, .sh, .sys, .ls extensions.
          # The usr/ tree contains plain-text data files that share the .ls
          # extension; exclude it from the syntax check.
          while IFS= read -r -d '' file; do
            if luac5.1 -p "$file" 2>/tmp/lua_err; then
              echo "OK  $file"
            else
              echo "FAIL $file: $(cat /tmp/lua_err)"
              FAILED=1
            fi
          done < <(find . \
            -not -path './.git/*' \
            -not -path './usr/*' \
            \( -name '*.lua' -o -name '*.sh' -o -name '*.sys' -o -name '*.ls' \) \
            -print0)
          exit $FAILED

      - name: Validate APT package index
        run: |
          set -euo pipefail

          mapfile -t manifests < <(find etc/apt/manifest \
            -maxdepth 1 \
            -type f \
            -name '*.db' \
            ! -name 'APT.db' \
            -printf '%f\n' | sed 's/\.db$//' | sort)

          mapfile -t listed < <(tail -n +2 etc/apt/manifest/APT.db | sed '/^$/d' | sort)

          if ! diff -u <(printf '%s\n' "${listed[@]}") <(printf '%s\n' "${manifests[@]}"); then
            echo "APT.db does not match the package manifests in etc/apt/manifest/"
            exit 1
          fi

           for manifest in etc/apt/manifest/*.db; do
             if [ "$(basename "$manifest")" = 'APT.db' ]; then
               continue
             fi
             grep -qx 'AIF=true' "$manifest"
             grep -q '^version=' "$manifest"
           done

           grep -qx '/etc/apt/manifest/APT.db' etc/apt/manifest/minux-main.db

           mapfile -t package_payload < <(find . \
             -type f \
             -not -path './.git/*' \
             -not -path './.github/*' \
             -not -path './tmp/*' \
             -not -path './usr/*' \
             -not -path './README.md' \
             -not -path './CONTRIBUTING.md' \
             -not -path './LICENSE' \
             -not -path './etc/apt/list/installed.db' \
             -not -path './etc/apt/manifest/minux-main.db' \
             -printf '/%P\n' | sort)

           mapfile -t filelist < <(awk '$0 == "[filelist]" { found = 1; next } found && $0 ~ /^\[/ { exit } found && $0 != "" { print }' \
             etc/apt/manifest/minux-main.db | sort)

           if ! diff -u <(printf '%s\n' "${filelist[@]}") <(printf '%s\n' "${package_payload[@]}"); then
             echo "minux-main.db [filelist] does not match the packaged repository files"
             exit 1
           fi

  craftos-smoke:
    name: CraftOS-PC smoke test
    runs-on: ubuntu-latest
    needs: syntax-check
    env:
      CRAFTOS_PC_VERSION: v2.8.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CraftOS-PC runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libpulse0

      - name: Download CraftOS-PC
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/craftos-pc"
          curl --fail --show-error --location --retry 3 --retry-delay 2 \
            -o "$RUNNER_TEMP/craftos-pc/CraftOS-PC.x86_64.AppImage" \
            "https://github.com/MCJack123/craftos2/releases/download/${CRAFTOS_PC_VERSION}/CraftOS-PC.x86_64.AppImage"
          chmod +x "$RUNNER_TEMP/craftos-pc/CraftOS-PC.x86_64.AppImage"
          (
            cd "$RUNNER_TEMP/craftos-pc"
            ./CraftOS-PC.x86_64.AppImage --appimage-extract >/dev/null
          )

      - name: Boot ReMinux in CraftOS-PC
        env:
          CRAFTOS_PC_BIN: ${{ runner.temp }}/craftos-pc/squashfs-root/AppRun
        run: ./.github/scripts/run-craftos-smoke.bash
