name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG_PATTERN: '^v?[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z._-]+)?$'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1

      - name: Validate release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG_NAME" =~ $RELEASE_TAG_PATTERN ]]; then
            echo "Release tags must match vX.Y.Z or X.Y.Z-suffix"
            exit 1
          fi

      - name: Syntax-check all Lua / shell scripts
        run: |
          set -e
          FAILED=0
          while IFS= read -r -d '' file; do
            if luac5.1 -p "$file" 2>/tmp/lua_err; then
              echo "OK  $file"
            else
              echo "FAIL $file: $(cat /tmp/lua_err)"
              FAILED=1
            fi
          done < <(find . \
            -not -path './.git/*' \
            -not -path './usr/*' \
            \( -name '*.lua' -o -name '*.sh' -o -name '*.sys' -o -name '*.ls' \) \
            -print0)
          exit $FAILED

      - name: Validate APT package index
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"

          mapfile -t manifests < <(find etc/apt/manifest \
            -maxdepth 1 \
            -type f \
            -name '*.db' \
            ! -name 'APT.db' \
            -printf '%f\n' | sed 's/\.db$//' | sort)

          mapfile -t listed < <(tail -n +2 etc/apt/manifest/APT.db | sed '/^$/d' | sort)

          if ! diff -u <(printf '%s\n' "${listed[@]}") <(printf '%s\n' "${manifests[@]}"); then
            echo "APT.db does not match the package manifests in etc/apt/manifest/"
            exit 1
          fi

           for manifest in etc/apt/manifest/*.db; do
             if [ "$(basename "$manifest")" = 'APT.db' ]; then
               continue
             fi
             grep -qx 'AIF=true' "$manifest"
             grep -qx "version=$VERSION" "$manifest"
           done

           grep -qx '/etc/apt/manifest/APT.db' etc/apt/manifest/minux-main.db

           mapfile -t package_payload < <(find . \
             -type f \
             -not -path './.git/*' \
             -not -path './.github/*' \
             -not -path './tmp/*' \
             -not -path './usr/*' \
             -not -path './README.md' \
             -not -path './CONTRIBUTING.md' \
             -not -path './LICENSE' \
             -not -path './etc/apt/list/installed.db' \
             -not -path './etc/apt/manifest/minux-main.db' \
             -printf '/%P\n' | sort)

           mapfile -t filelist < <(awk '$0 == "[filelist]" { found = 1; next } found && $0 ~ /^\[/ { exit } found && $0 != "" { print }' \
             etc/apt/manifest/minux-main.db | sort)

           if ! diff -u <(printf '%s\n' "${filelist[@]}") <(printf '%s\n' "${package_payload[@]}"); then
             echo "minux-main.db [filelist] does not match the packaged repository files"
             exit 1
           fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ $RELEASE_TAG_PATTERN ]]; then
            echo "Release tags must match vX.Y.Z or X.Y.Z-suffix"
            exit 1
          fi
          prerelease_flag=""
          if [[ ! "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease_flag="--prerelease"
          fi
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release already exists for $TAG_NAME"
          elif [[ -n "$prerelease_flag" ]]; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes "$prerelease_flag"
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          fi
